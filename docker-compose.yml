services:
  scip-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scip-bot
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - CLIENT_ID=${CLIENT_ID}
      - GUILD_ID=${GUILD_ID}
      - MONGODB_URI=${MONGODB_URI}
      - NODE_ENV=production
    volumes:
      # Mount logs directory for persistence
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
